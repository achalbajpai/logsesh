name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write
  id-token: write

env:
  PNPM_CONFIG_MINIMUM_RELEASE_AGE: 60
  PNPM_CONFIG_MINIMUM_RELEASE_AGE_EXCLUDE: "@logsesh/core,logsesh"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify

      - name: Publish core package
        run: |
          version="${GITHUB_REF_NAME#v}"
          if npm view "@logsesh/core@$version" version >/dev/null 2>&1; then
            echo "@logsesh/core@$version is already published; skipping"
          else
            pnpm --filter @logsesh/core publish --access public --provenance --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish CLI package
        run: |
          version="${GITHUB_REF_NAME#v}"
          if npm view "logsesh@$version" version >/dev/null 2>&1; then
            echo "logsesh@$version is already published; skipping"
          else
            pnpm --filter logsesh publish --access public --provenance --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub release $GITHUB_REF_NAME already exists; skipping"
          else
            gh release create "$GITHUB_REF_NAME" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
