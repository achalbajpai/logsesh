name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  PNPM_CONFIG_MINIMUM_RELEASE_AGE: 60
  PNPM_CONFIG_MINIMUM_RELEASE_AGE_EXCLUDE: "@logsesh/core,logsesh"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Test coverage
        run: pnpm test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: error

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm fmt:check

      - name: Schema drift check
        run: pnpm gen:schema:check

      - name: Pricing integrity check
        run: pnpm check:pricing

      - name: Package dry-run
        run: |
          pnpm --filter @logsesh/core pack --dry-run
          pnpm --filter logsesh pack --dry-run
